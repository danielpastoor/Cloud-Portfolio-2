services:
  app1:
    image: hashicorp/http-echo:0.2.3
    command: -text="RESPONSE SERVER 1(app1)"
  
  app2:
    image: hashicorp/http-echo:0.2.3
    command: -text="RESPONSE SERVER 2(app2)"

  app3:
    image: hashicorp/http-echo:0.2.3
    command: -text="RESPONSE SERVER 3(app3)"
  
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3